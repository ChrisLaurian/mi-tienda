<ion-content [fullscreen]="true" class="login-content">
  <div class="login-top-section">
    <button class="back-btn" (click)="goBack()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 18L9 12L15 6" stroke="#FF6B35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="page-title">Iniciar Sesión</h1>
  </div>

  <div class="login-bottom-section">
    <div class="login-card">
      <h2 class="welcome-title">Bienvenido</h2>
      <p class="welcome-text">
        Descubre los mejores productos al alcance de tu mano.
        Compra fácil, rápido y seguro desde cualquier lugar.
      </p>

      <div class="form-container">
        <div class="form-group">
          <label class="form-label">Correo Electrónico o Número Móvil</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              [(ngModel)]="username"
              placeholder="ejemplo@correo.com"
              class="native-input"
              autocomplete="off"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              [(ngModel)]="password"
              placeholder="••••••••••"
              class="native-input"
              autocomplete="off"
            />
          </div>
        </div>

        <div class="forgot-password">
          <a (click)="forgotPassword()">¿Olvidaste tu contraseña?</a>
        </div>

        <div *ngIf="errorMessage" class="error-message">
          <ion-text color="danger">{{ errorMessage }}</ion-text>
        </div>

        <ion-button 
          expand="block" 
          class="login-btn"
          (click)="onLogin()"
          [disabled]="isLoading"
        >
          <ion-spinner *ngIf="isLoading" name="crescent" color="light"></ion-spinner>
          <span *ngIf="!isLoading">INICIAR SESIÓN</span>
        </ion-button>

        <div class="signup-link">
          <span>¿No tienes cuenta?</span>
          <a (click)="goToSignup()">Regístrate</a>
        </div>
      </div>

      <div class="demo-hint">
        <p>Demo: Admin / Root</p>
      </div>
    </div>
  </div>
</ion-content>
