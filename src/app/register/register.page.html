<ion-content [fullscreen]="true" class="register-content">
  <div class="register-top-section">
    <button class="back-btn" (click)="goBack()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 18L9 12L15 6" stroke="#5d4037" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="page-title">Nueva Cuenta</h1>
  </div>

  <div class="register-bottom-section">
    <div class="register-card">
      <div class="form-container">
        
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <div class="input-wrapper">
            <input type="text" [(ngModel)]="fullName" placeholder="Tu nombre" class="native-input" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Correo electrónico</label>
          <div class="input-wrapper">
            <input type="email" [(ngModel)]="email" placeholder="example@example.com" class="native-input" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" [(ngModel)]="password" placeholder="*************" class="native-input" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirmar contraseña</label>
          <div class="input-wrapper">
            <input type="password" [(ngModel)]="confirmPassword" placeholder="*************" class="native-input" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Número de móvil (opcional)</label>
          <div class="input-wrapper">
            <input type="tel" [(ngModel)]="mobile" placeholder="+ 123 456 789" class="native-input" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Fecha de nacimiento (opcional)</label>
          <div class="input-wrapper">
            <input type="text" [(ngModel)]="dob" placeholder="DD / MM / AAAA" class="native-input" />
          </div>
        </div>

        <div *ngIf="errorMessage" class="error-message">
          <ion-text color="danger">{{ errorMessage }}</ion-text>
        </div>

        <p class="terms-text">Al continuar, aceptas nuestros <a href="#">Términos de uso</a> y <a href="#">Política de privacidad</a>.</p>

        <ion-button 
          expand="block" 
          class="signup-btn"
          (click)="onRegister()"
          [disabled]="isLoading"
        >
          <ion-spinner *ngIf="isLoading" name="crescent" color="light"></ion-spinner>
          <span *ngIf="!isLoading">REGISTRARSE</span>
        </ion-button>

        <div class="login-link">
          <span>¿Ya tienes cuenta?</span>
          <a routerLink="/login">Iniciar Sesión</a>
        </div>
      </div>
    </div>
  </div>
</ion-content>
