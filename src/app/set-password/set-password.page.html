<ion-content [fullscreen]="true" class="register-content">
  <div class="register-top-section">
    <button class="back-btn" (click)="goBack()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 18L9 12L15 6" stroke="#5d4037" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="page-title">Establecer Contraseña</h1>
  </div>

  <div class="register-bottom-section">
    <div class="register-card">
      <div class="form-container">
        <p class="form-label">
          Por favor, ingresa tu nueva contraseña y confírmala para asegurar tu cuenta.
        </p>
        <br>
        
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" [(ngModel)]="password" placeholder="*************" class="native-input" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirmar Contraseña</label>
          <div class="input-wrapper">
            <input type="password" [(ngModel)]="confirmPassword" placeholder="*************" class="native-input" />
          </div>
        </div>

        <div *ngIf="errorMessage" class="error-message">
          <ion-text color="danger">{{ errorMessage }}</ion-text>
        </div>

        <ion-button 
          expand="block" 
          class="signup-btn"
          (click)="onCreatePassword()"
          [disabled]="isLoading"
        >
          <ion-spinner *ngIf="isLoading" name="crescent" color="light"></ion-spinner>
          <span *ngIf="!isLoading">CREAR NUEVA CONTRASEÑA</span>
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
