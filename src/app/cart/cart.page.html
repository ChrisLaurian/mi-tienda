<ion-content [fullscreen]="true" class="orders-content">
  <!-- Yellow Header Section -->
  <div class="header-section">
    <div class="header-top">
      <button class="back-btn" (click)="goBack()" style="background: transparent; border: none; cursor: pointer;">
        <span style="font-size: 24px; font-weight: 300; color: var(--color-white);">&lt;</span>
      </button>
      <h1 class="page-title">Mi Carrito</h1>
      <div class="header-spacer"></div>
    </div>
  </div>

  <!-- Cart List (Products to Pay) -->
  <div class="cart-list" style="padding: 20px;">
    <div *ngIf="(items$ | async)?.length === 0" class="empty-state" style="text-align: center; padding: 40px; color: #999;">
      <ion-icon name="bag-outline" style="font-size: 64px;"></ion-icon>
      <p>Tu carrito está vacío</p>
    </div>
    
    <div class="cart-item" *ngFor="let item of (items$ | async)" style="display: flex; align-items: center; background: var(--color-white); padding: 15px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
      <div class="item-image" style="width: 60px; height: 60px; border-radius: 15px; overflow: hidden; margin-right: 15px;">
        <img [src]="item.imageUrl" [alt]="item.name" style="width: 100%; height: 100%; object-fit: cover;" />
      </div>
      <div class="item-info" style="flex: 1;">
        <h3 class="item-name" style="margin: 0; font-size: 16px; color: var(--color-dark-brown);">{{ item.name }}</h3>
        <p class="item-price" style="margin: 5px 0 0; color: var(--color-orange); font-weight: 700;">${{ item.price.toFixed(2) }}</p>
      </div>
      <div class="item-quantity" style="color: var(--color-dark-brown);">x{{ item.quantity }}</div>
    </div>
  </div>

  <!-- Checkout Button -->
  <div class="checkout-section" style="padding: 20px;">
    <ion-button expand="block" class="checkout-btn" routerLink="/payment" style="--background: var(--color-orange); --border-radius: 25px; height: 55px; font-weight: bold;">
      Ir a Pagar
    </ion-button>
  </div>
</ion-content>
