<ion-content [fullscreen]="true" class="product-content">
  <!-- Yellow Header Section -->
  <div class="header-section">
    <div class="header-top">
      <button class="back-btn" (click)="goBack()" style="background: transparent; border: none; cursor: pointer;">
        <span style="font-size: 24px; font-weight: 300; color: var(--color-dark-brown);">&lt;</span>
      </button>
      <h1 class="page-title">{{ product?.name || 'Producto' }}</h1>
      <button class="favorite-btn" (click)="toggleFavorite()">
        <span style="font-size: 24px; font-weight: 300; color: var(--color-dark-brown);">{{ isFavorite ? '♥' : '♡' }}</span>
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-container">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p>Cargando producto...</p>
  </div>

  <!-- Product Content -->
  <div *ngIf="!isLoading && product" class="product-content-section">
    <!-- Product Image Card -->
    <div class="product-image-card">
      <img 
        *ngIf="product.images && product.images.length > 0"
        [src]="product.images[0].src" 
        [alt]="product.name"
        class="product-image"
      />
    </div>

    <!-- Price and Quantity -->
    <div class="price-quantity-section">
      <span class="product-price">${{ getBasePriceNumber().toFixed(2) }}</span>
      <div class="quantity-selector">
        <button class="qty-btn minus" (click)="decreaseQuantity()">
          <span style="font-size: 24px; font-weight: 300; color: white;">-</span>
        </button>
        <span class="qty-value">{{ quantity }}</span>
        <button class="qty-btn plus" (click)="increaseQuantity()">
          <span style="font-size: 24px; font-weight: 300; color: white;">+</span>
        </button>
      </div>
    </div>

    <!-- Product Description -->
    <div class="product-info">
      <h2 class="product-name-bold">{{ product.name }}</h2>
      <p class="product-description" [innerHTML]="product.short_description || product.description"></p>
    </div>

    <!-- Add on ingredients Section -->
    <ng-container *ngIf="topicsToRender.length > 0">
      <div class="toppings-section">
        <h3 class="section-title">Add on ingredients</h3>
        
        <div class="topping-group" *ngFor="let topic of topicsToRender">
          <h4 class="topic-name">{{ topic.label }}</h4>
          <div class="topping-item" *ngFor="let opt of topic.options">
            <div class="topping-row">
              <span class="topping-name">{{ opt.label }}</span>
              <div class="topping-right">
                <span class="topping-price">${{ (opt.price || 0).toFixed(2) }}</span>
                <button 
                  class="topping-radio"
                  [class.selected]="selectedByTopic[topic.key]?.has(opt.id)"
                  (click)="toggleOption(topic.key, opt.id, !selectedByTopic[topic.key]?.has(opt.id))">
                  <div class="radio-inner"></div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </ng-container>
  </div>

    <!-- Add to Cart Button (Fixed at bottom) -->
  <div class="add-to-cart-section" *ngIf="!isLoading && product">
    <button class="add-to-cart-btn" (click)="addToCart()" [class.added]="isAdded">
      <ion-icon name="cart-outline"></ion-icon>
      {{ isAdded ? '¡Añadido!' : 'Add to Cart' }}
    </button>
  </div>
</ion-content>
