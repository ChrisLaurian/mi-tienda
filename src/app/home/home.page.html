<ion-content class="welcome-content">
  <div class="welcome-container">
    <div class="logo-container">
      <svg class="logo-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M60 100C60 100 20 70 20 45C20 30 30 20 45 20C52 20 58 25 60 30C62 25 68 20 75 20C90 20 100 30 100 45C100 70 60 100 60 100Z" stroke="#FFD54F" stroke-width="3" fill="none"/>
        <circle cx="35" cy="35" r="12" stroke="#FFD54F" stroke-width="3" fill="none"/>
        <circle cx="85" cy="35" r="12" stroke="#FFD54F" stroke-width="3" fill="none"/>
        <path d="M90 55V85M85 55V70M95 55V70" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
        <circle cx="90" cy="50" r="5" stroke="#FFD54F" stroke-width="2" fill="none"/>
        <path d="M30 55V85" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
        <ellipse cx="30" cy="50" rx="8" ry="10" stroke="#FFD54F" stroke-width="2" fill="none"/>
      </svg>
    </div>

    <h1 class="app-title">MI TIENDA</h1>
    
    <p class="app-description">
      Descubre los mejores productos al alcance de tu mano.
      Compra fácil, rápido y seguro desde cualquier lugar.
    </p>

    <div class="buttons-container">
      <ion-button expand="block" class="login-btn" routerLink="/login">
        Iniciar Sesión
      </ion-button>
      <ion-button expand="block" class="signup-btn" (click)="onSignUp()">
        Registrarse
      </ion-button>
      <ion-button expand="block" class="store-selector-btn" (click)="goToStoreSelector()">
        <ion-icon name="location-outline" slot="start"></ion-icon>
        Cambiar Tienda
      </ion-button>
    </div>
  </div>

  <ion-footer>
    <ion-toolbar class="welcome-footer">
      <ion-title>© 2026 Mi Tienda</ion-title>
    </ion-toolbar>
  </ion-footer>
</ion-content>
